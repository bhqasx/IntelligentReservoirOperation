<script>
  window.onload = function() {
  // Fetch the JSON data
  fetch('Xiaolangdi.json')
    .then(response => response.json())
    .then(data => {
      // Store the data in the XLD object
      var XLD = data;

      // Get the first chart area
      var ctx = document.getElementById('chartArea1').getContext('2d');

      // Create the chart
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: XLD.map(item => item.t),
          datasets: [
            {
              label: 'Inflow',
              data: XLD.map(item => item.inflow),
              yAxisID: 'y-axis-1',
            },
            {
              label: 'Outflow',
              data: XLD.map(item => item.outflow),
              yAxisID: 'y-axis-1',
            },
            {
              label: 'Water Level',
              data: XLD.map(item => item.waterLevel),
              yAxisID: 'y-axis-2',
            }
          ]
        },
        options: {
          scales: {
            yAxes: [
              {
                id: 'y-axis-1',
                type: 'linear',
                position: 'left',
              },
              {
                id: 'y-axis-2',
                type: 'linear',
                position: 'right',
              }
            ]
          }
        }
      });
    });
    
    //处理表格输入
    var tables = ['table1', 'table2'];
    for (var t = 0; t < tables.length; t++) {
      var table = document.getElementsByClassName(tables[t])[0];
      var inputs = table.getElementsByClassName('serial-number');
      var inputsT = table.getElementsByClassName('input-t');
      var inputsQ = table.getElementsByClassName('input-q');
      var tValues = [], qValues = [];
      for (var i = 0; i < inputs.length; i++) {
        inputs[i].value = i + 1;
        inputsT[i].addEventListener('input', function () {
          tValues[i] = this.value;
          //让输入的值变成红色
          if (this.value > 100) {
            this.style.color = 'red';
          } else {
            this.style.color = 'black';
          }
        });
        inputsQ[i].addEventListener('input', function () {
          qValues[i] = this.value;
        });
      }
      console.log('t values for table ' + (t + 1) + ':', tValues);
      console.log('Q values for table ' + (t + 1) + ':', qValues);
    }
  }
</script>
