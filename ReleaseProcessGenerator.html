<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <title>Page with Drawing Areas and Tables</title>
  <style>
    .drawing-area-container {
      display: flex;
      flex-direction: row;
      width: 60vw;
    }
    .drawing-area {
      width: 50%;
      height: 200px;
      border: 1px solid black;
    }
    #chartArea1, #chartArea2 {
      width: 50%;
      border: 1px solid black;
    }
    table {
      margin-top: 20px;
      border-collapse: collapse;
    }
    td, th {
      border: 1px solid black;
      padding: 5px;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    input[type="number"] {
      -moz-appearance: textfield;
    }
  </style>
</head>
<body>
  <div class="drawing-area-container">
    <canvas id="chartArea1" class="drawing-area"></canvas>
    <canvas id="chartArea2" class="drawing-area"></canvas>
  </div>
  <table class="table1">
    <tr>
      <th colspan="3">小浪底</th>
    </tr>
    <tr>
      <th>序号</th>
      <th>t</th>
      <th>Q</th>
    </tr>
    <tr>
      <td><input class="serial-number" type="number"></td>
      <td><input class="input-t" type="number"></td>
      <td><input class="input-q" type="number"></td>
    </tr>
    <tr>
      <td><input class="serial-number" type="number"></td>
      <td><input class="input-t" type="number"></td>
      <td><input class="input-q" type="number" style="background-color: yellow;" readonly></td>
    </tr>
    <tr>
      <td><input class="serial-number" type="number"></td>
      <td><input class="input-t" type="number"></td>
      <td><input class="input-q" type="number"></td>
    </tr>
    <tr>
      <td><input class="serial-number" type="number"></td>
      <td><input class="input-t" type="number"></td>
      <td><input class="input-q" type="number"></td>
    </tr>
    <tr>
      <td><input class="serial-number" type="number"></td>
      <td><input class="input-t" type="number"></td>
      <td><input class="input-q" type="number"></td>
    </tr>
    <tr>
      <td><input class="serial-number" type="number"></td>
      <td><input class="input-t" type="number"></td>
      <td><input class="input-q" type="number"></td>
    </tr>
    <tr>
      <td><input class="serial-number" type="number"></td>
      <td><input class="input-t" type="number"></td>
      <td><input class="input-q" type="number"></td>
    </tr>
    <tr>
      <td><input class="serial-number" type="number"></td>
      <td><input class="input-t" type="number"></td>
      <td><input class="input-q" type="number"></td>
    </tr>
    <tr>
      <td><input class="serial-number" type="number"></td>
      <td><input class="input-t" type="number"></td>
      <td><input class="input-q" type="number"></td>
    </tr>
    <tr>
      <td><input class="serial-number" type="number"></td>
      <td><input class="input-t" type="number"></td>
      <td><input class="input-q" type="number"></td>
    </tr>
    <tr>
      <td><input class="serial-number" type="number"></td>
      <td><input class="input-t" type="number"></td>
      <td><input class="input-q" type="number"></td>
    </tr>
  </table>
  <table class="table2">
    <tr>
      <th colspan="3">三门峡</th>
    </tr>
    <tr>
      <th>序号</th>
      <th>t</th>
      <th>Q</th>
    </tr>
    <tr>
      <td><input class="serial-number" type="number"></td>
      <td><input class="input-t" type="number"></td>
      <td><input class="input-q" type="text" value="Qin"></td>
    </tr>
    <tr>

    </tr>

      <td><input class="input-q" type="number"></td>
    </tr>

      <td><input class="serial-number" type="number"></td>
      <td><input class="input-t" type="number"></td>
      <td><input class="input-q" type="text" value="Qin"></td>
    </tr>
    <tr>
      <td><input class="serial-number" type="number"></td>
      <td><input class="input-t" type="number"></td>
      <td><input class="input-q" type="text" value="Qin"></td>
    </tr>
  </table>
</body>
<script>
  window.onload = function() {
  // Fetch the JSON data for Xiaolangdi
  fetch('Xiaolangdi.json')
    .then(response => response.json())
    .then(data => {
      // Store the data in the XLD object
      var XLD = data;

      // Get the first chart area
      var ctx = document.getElementById('chartArea1').getContext('2d');

      // Create the chart
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: XLD.t,
          datasets: [
            {
              label: 'Inflow',
              data: XLD.Inflow,
              yAxisID: 'y-axis-1',
            },
            {
              label: 'Outflow',
              data: XLD.Outflow,
              yAxisID: 'y-axis-1',
            },
            {
              label: 'Water Level',
              data: XLD["Water level"],
              yAxisID: 'y-axis-2',
            }
          ]
        },
        options: {
          responsive: true,
          scales: {
            yAxes: [
              {
                id: 'y-axis-1',
                type: 'linear',
                position: 'left',
              },
              {
                id: 'y-axis-2',
                type: 'linear',
                position: 'right',
              }
            ]
          }
        }
      });
    });
    
    // Fetch the JSON data for Sanmenxia
    fetch('Sanmenxia.json')
      .then(response => response.json())
      .then(data => {
        // Store the data in the SMX object
        var SMX = data;

        // Get the second chart area
        var ctx = document.getElementById('chartArea2').getContext('2d');

        // Create the chart
        new Chart(ctx, {
          type: 'line',
          data: {
            labels: SMX.t,
            datasets: [
              {
                label: 'Inflow',
                data: SMX.Inflow,
                yAxisID: 'y-axis-1',
              },
              {
                label: 'Outflow',
                data: SMX.Outflow,
                yAxisID: 'y-axis-1',
              },
              {
                label: 'Water Level',
                data: SMX["Water level"],
                yAxisID: 'y-axis-2',
              }
            ]
          },
          options: {
            responsive: true,
            scales: {
              yAxes: [
                {
                  id: 'y-axis-1',
                  type: 'linear',
                  position: 'left',
                },
                {
                  id: 'y-axis-2',
                  type: 'linear',
                  position: 'right',
                }
              ]
            }
          }
        });
      });

    //处理表格输入
    var tables = ['table1', 'table2'];
    var XLD_t = [], XLD_q = [], SMX_t = [], SMX_q = [];

    for (var t = 0; t < tables.length; t++) {
      var table = document.getElementsByClassName(tables[t])[0];
      var inputs = table.getElementsByClassName('serial-number');
      var inputsT = table.getElementsByClassName('input-t');
      var inputsQ = table.getElementsByClassName('input-q');

      for (var i = 0; i < inputs.length; i++) {
        inputs[i].value = i + 1;
        (function(i) {
        inputsT[i].addEventListener('input', function () {
          if (tables[t] === 'table1') {
            XLD_t[i] = this.value;
          } else {
            SMX_t[i] = this.value;
          }
          //让输入的值变成红色
          if (this.value > 100) {
            this.style.color = 'red';
          } else {
            this.style.color = 'black';
          }
        });
        inputsQ[i].addEventListener('input', function () {
          if (isNaN(this.value)) {
            if (tables[t] === 'table1') {
              XLD_q[i] = NaN;
            } else {
              SMX_q[i] = NaN;
            }
          } else {
            if (tables[t] === 'table1') {
              XLD_q[i] = this.value;
            } else {
              SMX_q[i] = this.value;
            }
          }
        });
      })(i);
      }

      console.log('t values for table ' + (t + 1) + ':', tables[t] === 'table1' ? XLD_t : SMX_t);
      console.log('Q values for table ' + (t + 1) + ':', tables[t] === 'table1' ? XLD_q : SMX_q);
    }
  }
</script>
</html>
