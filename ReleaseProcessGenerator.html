<script>
  window.onload = function() {
    var tables = ['table1', 'table2'];
    for (var t = 0; t < tables.length; t++) {
      var table = document.getElementsByClassName(tables[t])[0];
      var inputs = table.getElementsByClassName('serial-number');

        inputs[i].value = i + 1;
      }
    }
