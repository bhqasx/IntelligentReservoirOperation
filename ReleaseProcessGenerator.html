<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <title>Page with Drawing Areas and Tables</title>
  <style>
    .container {
      display: flex;
      align-items: center;
    }
    .drawing-area-container {
      display: flex;
      flex-direction: row;
      width: 60vw;
    }
    .drawing-area {
      width: 50%;
      height: 200px;
      border: 1px solid black;
    }
    #chartArea1, #chartArea2 {
      width: 50%;
      border: 1px solid black;
    }
    table {
      margin-top: 20px;
      margin-right: 50px;
      border-collapse: collapse;
    }
    td, th {
      border: 1px solid black;
      padding: 5px;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    input[type="number"] {
      -moz-appearance: textfield;
    }
  </style>
</head>
<body>
  <div class="drawing-area-container">
    <canvas id="chartArea1" class="drawing-area"></canvas>
    <canvas id="chartArea2" class="drawing-area"></canvas>
  </div>
  <div class="container">
    <div>
      <div>小浪底初始水位</div>
      <div style="display: flex; align-items: center;">
        <input id="WL-Initial" type="number">
        <p style="margin-left: 10px;">(m)</p>
      </div>
      <div>小浪底汛限水位</div>
      <div style="display: flex; align-items: center;">
        <input id="WL-FloodControl" type="number">
        <p style="margin-left: 10px;">(m)</p>
      </div>
      <div>小浪底对接水位</div>
      <div style="display: flex; align-items: center;">
        <input id="WL-WaterSedReg" type="number">
        <p style="margin-left: 10px;">(m)</p>
      </div>
      <div>小浪底期末可供水量</div>
      <div style="display: flex; align-items: center;">
        <input id="Vol-WatSupply" type="number">
        <p style="margin-left: 10px;">(亿m³)</p>
      </div>
      <div>三门峡初始水位</div>
      <div style="display: flex; align-items: center;">
        <input id="WL-Initial-SMX" type="number">
        <p style="margin-left: 10px;">(m)</p> 
      </div>
      <div>三门峡汛限水位</div>
      <div style="display: flex; align-items: center;">
        <input id="WL-FloodControl-SMX" type="number">
        <p style="margin-left: 10px;">(m)</p>
      </div>
    </div>
    <table class="table1">
      <tr>
        <th colspan="3">小浪底</th>
      </tr>
      <tr>
        <th>序号</th>
        <th>t</th>
        <th>Q</th>
      </tr>
      <tr>
        <td><input class="serial-number" type="number"></td>
        <td><input class="input-t" id="table1T1" type="number"></td>
        <td><input class="input-q" id="table1Q1" type="number"></td>
      </tr>
      <tr>
        <td><input class="serial-number" type="number"></td>
        <td><input class="input-t" id="table1T2" type="number" style="background-color:rgb(205, 211, 211)"></td>
        <td><input class="input-q" type="number" style="background-color: yellow;" readonly></td>
      </tr>
      <tr>
        <td><input class="serial-number" type="number"></td>
        <td><input class="input-t" type="number" style="background-color: yellow;" readonly></td>
        <td><input class="input-q" id="table1Q3" type="number"></td>
      </tr>
      <tr>
        <td><input class="serial-number" type="number"></td>
        <td><input class="input-t" type="number" style="background-color: yellow;" readonly></td>
        <td><input class="input-q" type="number" style="background-color: yellow;" readonly></td>
      </tr>
      <tr>
        <td><input class="serial-number" type="number"></td>
        <td><input class="input-t" type="number" style="background-color: yellow;" readonly></td>
        <td><input class="input-q" id="table1Q5" type="number"></td>
      </tr>
      <tr>
        <td><input class="serial-number" type="number"></td>
        <td><input class="input-t" type="number" style="background-color: yellow;" readonly></td>
        <td><input class="input-q" id="table1Q6" type="number" style="background-color: rgb(205, 211, 211);"></td>
      </tr>
      <tr>
        <td><input class="serial-number" type="number"></td>
        <td><input class="input-t" type="number" style="background-color: yellow;" readonly></td>
        <td><input class="input-q" type="number" style="background-color: yellow;" readonly></td>
      </tr>
      <tr>
        <td><input class="serial-number" type="number"></td>
        <td><input class="input-t" type="number" style="background-color: yellow;" readonly></td>
        <td><input class="input-q" type="number" style="background-color: yellow;" readonly></td>
      </tr>
      <tr>
        <td><input class="serial-number" type="number"></td>
        <td><input class="input-t" type="number" style="background-color: yellow;" readonly></td>
        <td><input class="input-q" type="number" style="background-color: yellow;" readonly></td>
      </tr>
      <tr>
        <td><input class="serial-number" type="number"></td>
        <td><input class="input-t" type="number" style="background-color: yellow;" readonly></td>
        <td><input class="input-q" id="table1Q10" type="number"></td>
      </tr>
      <tr>
        <td><input class="serial-number" type="number"></td>
        <td><input class="input-t" id="table1Q11" type="number"></td>
        <td><input class="input-q" type="number" style="background-color: yellow;" readonly></td>
      </tr>
    </table>
    <table class="table2">
      <tr>
        <th colspan="3">三门峡</th>
      </tr>
      <tr>
        <th>序号</th>
        <th>t</th>
        <th>Q</th>
      </tr>
      <tr>
        <td><input class="serial-number" type="number"></td>
        <td><input class="input-t" type="number" style="background-color: yellow;" readonly></td>
        <td><input class="input-q" type="text" value="Qin"></td>
      </tr>
      <tr>
        <td><input class="serial-number" type="number"></td>
        <td><input class="input-t" id="table2T2" type="number" style="background-color:rgb(205, 211, 211)"></td>
        <td><input class="input-q" type="text" value="Qin"></td>
      </tr>
      <tr>
        <td><input class="serial-number" type="number"></td>
        <td><input class="input-t" type="number" style="background-color: yellow;" readonly></td>
        <td><input class="input-q" id="table2Q3" type="number"></td>
      </tr>
      <tr>
        <td><input class="serial-number" type="number"></td>
        <td><input class="input-t" id="table2T4" type="number" style="background-color:rgb(205, 211, 211)"></td>
        <td><input class="input-q" type="number" style="background-color: yellow;" readonly></td>
      </tr>
      <tr>
        <td><input class="serial-number" type="number"></td>
        <td><input class="input-t" type="number" style="background-color: yellow;" readonly></td>
        <td><input class="input-q" id="table2Q5" type="number"></td>
      </tr>
      <tr>
        <td><input class="serial-number" type="number"></td>
        <td><input class="input-t" type="number" style="background-color: yellow;" readonly></td>
        <td><input class="input-q" type="number" style="background-color: yellow;" readonly></td>
      </tr>
      <tr>
        <td><input class="serial-number" type="number"></td>
        <td><input class="input-t" type="number" style="background-color: yellow;" readonly></td>
        <td><input class="input-q" type="text" value="Qin"></td>
      </tr>
    </table>
  </div>
  <button id="save">保存</button>
  <button id="plot">绘制</button>
  <button id="GenerateInitialPlan">生成初始计划</button>
</body>
<script src="main.js"></script>
<script src="GenerateIniP.js"></script>
</html>
